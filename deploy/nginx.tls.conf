# =============================================================
# 涉铁工程智能监控平台 —— HTTPS 443 块（自带证书时使用）
# 适用场景：已有证书（非 certbot 自动申请），希望手动启用 HTTPS。
#
# 用法：
#   1) 将本文件复制到 /etc/nginx/conf.d/rail-monitor.tls.conf
#   2) 修改下方 server_name 与 ssl_certificate/ssl_certificate_key 为真实路径
#   3) 在 deploy/nginx.conf 的 80 server 块末尾追加：
#        return 301 https://$host$request_uri;
#       （将 HTTP 全部跳转 HTTPS；certbot 会自动完成此步）
#   4) sudo nginx -t && sudo systemctl reload nginx
# =============================================================

server {
    listen 443 ssl;
    http2 on;
    server_name monitor.example.com;

    ssl_certificate     /etc/ssl/rail-monitor/fullchain.pem;
    ssl_certificate_key /etc/ssl/rail-monitor/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;            # 若 DNS 已解析且证书含 OCSP 信息可启用
    ssl_stapling_verify on;

    server_tokens off;
    client_max_body_size 50m;

    # HSTS：强制浏览器仅 HTTPS 访问（仅经 HTTPS 下发才有效）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'" always;

    # ---- 前端静态资源（SPA） ----
    root /opt/rail_monitor/web/dist;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- 实时 WebSocket（告警推送 /ws/alarm） ----
    location /ws/ {
        proxy_pass http://railmon_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- 后端 API（透传 /api 前缀） ----
    location /api/ {
        proxy_pass http://railmon_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /health {
        proxy_pass http://railmon_api;
        proxy_set_header Host $host;
    }
    location = /metrics {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://railmon_api;
        proxy_set_header Host $host;
    }
    location = /openapi.json {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://railmon_api;
        proxy_set_header Host $host;
    }
    location ~ ^/(docs|redoc)$ {
        deny all;
        return 403;
    }
}
