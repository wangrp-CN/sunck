# =============================================================
# 涉铁工程智能监控平台 —— Nginx 反向代理 / 前端静态托管（生产加固版）
# 部署方式：
#   sudo cp deploy/nginx.conf /etc/nginx/conf.d/rail-monitor.conf
#   sudo nginx -t            # 语法校验
#   sudo systemctl reload nginx
# 约定：项目部署于 /opt/rail_monitor（前端构建产出 /opt/rail_monitor/web/dist）
# 后端 API 监听 127.0.0.1:8000；前端通过同源 /api、/ws 访问，避免跨域。
#
# 生产加固项（本文件已落地）：
#   1) server_tokens off（隐藏 Nginx 版本）
#   2) 安全响应头（X-Frame-Options / X-Content-Type-Options / Referrer-Policy / CSP）
#   3) /metrics、/openapi.json 仅放通 127.0.0.1（监控在同源主机抓取）
#   4) /docs、/redoc 公网 deny all
#   5) /health 保持公网可达（供负载均衡/探活）
# HTTPS：默认仅监听 80。启用 HTTPS 见下方「HTTPS 启用」章节与 deploy/nginx.tls.conf /
#        deploy/scripts/setup-tls.sh（certbot 一键申请并自动改写本配置为 443+跳转）。
# =============================================================

upstream railmon_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    # 生产请改为实际域名，例如：server_name monitor.example.com;
    server_name _;

    # 隐藏版本号，降低信息泄露
    server_tokens off;

    # 大文件上传（附件/视频截图等），按需调整
    client_max_body_size 50m;

    # ---- 全局安全响应头（always：即使错误响应也带） ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 内容安全策略：同源为主；允许内联样式（ElementPlus 运行时注入）、图片 data:/blob:、
    # 以及同源自建 WebSocket。如前端引入第三方脚本/字体，请在此放开对应源。
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'" always;

    # ---- 前端静态资源（SPA） ----
    root /opt/rail_monitor/web/dist;
    index index.html;

    # 前端路由 history 模式回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- 实时 WebSocket（告警推送 /ws/alarm） ----
    location /ws/ {
        proxy_pass http://railmon_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- 后端 API（透传 /api 前缀，与开发代理一致） ----
    # 注意：proxy_pass 末尾不要加 "/"，否则会剥离 /api 前缀导致 404。
    location /api/ {
        proxy_pass http://railmon_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ---- 运维/监控端点（根路径，非 /api） ----
    location = /health {
        # 探活需公网可达：保持开放
        proxy_pass http://railmon_api;
        proxy_set_header Host $host;
    }

    # 指标端点：仅放通本机（Prometheus 在同源主机抓取）；
    # 若监控组件在独立网段，请将对应 IP 加入 allow 列表。
    location = /metrics {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://railmon_api;
        proxy_set_header Host $host;
    }

    location = /openapi.json {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://railmon_api;
        proxy_set_header Host $host;
    }

    # ---- 安全：Swagger/Redoc 不对外暴露（内网调试可在内网 server 块放开） ----
    location ~ ^/(docs|redoc)$ {
        deny all;
        return 403;
    }

    # ---- 可选：媒体走 MinIO 时也可在此反代（需 MinIO 监听本地） ----
    # location /media/ {
    #     proxy_pass http://127.0.0.1:9000/;
    #     proxy_set_header Host $host;
    # }
}

