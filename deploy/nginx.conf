# =============================================================
# 涉铁工程智能监控平台 —— Nginx 反向代理 / 前端静态托管
# 部署方式：
#   sudo cp deploy/nginx.conf /etc/nginx/conf.d/rail-monitor.conf
#   sudo nginx -t            # 语法校验
#   sudo systemctl reload nginx
# 约定：项目部署于 /opt/rail_monitor（前端构建产出 /opt/rail_monitor/web/dist）
# 后端 API 监听 127.0.0.1:8000；前端通过同源 /api、/ws 访问，避免跨域。
# =============================================================

upstream railmon_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    # 生产请改为实际域名，例如：server_name monitor.example.com;
    server_name _;

    # 大文件上传（附件/视频截图等），按需调整
    client_max_body_size 50m;

    # ---- 前端静态资源（SPA） ----
    root /opt/rail_monitor/web/dist;
    index index.html;

    # 前端路由 history 模式回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- 实时 WebSocket（告警推送 /ws/alarm） ----
    location /ws/ {
        proxy_pass http://railmon_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- 后端 API（透传 /api 前缀，与开发代理一致） ----
    # 注意：proxy_pass 末尾不要加 "/"，否则会剥离 /api 前缀导致 404。
    location /api/ {
        proxy_pass http://railmon_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ---- 运维/监控端点（根路径，非 /api） ----
    location = /health {
        proxy_pass http://railmon_api;
        proxy_set_header Host $host;
    }
    location = /metrics {
        # 建议仅允许内网/监控网段；此处放通，生产请加 allow/deny。
        proxy_pass http://railmon_api;
        proxy_set_header Host $host;
    }
    location = /openapi.json {
        proxy_pass http://railmon_api;
        proxy_set_header Host $host;
    }

    # ---- 安全：Swagger/Redoc 不对外暴露（内网调试可在内网 server 块放开） ----
    location ~ ^/(docs|redoc)$ {
        deny all;
        return 403;
    }

    # ---- 可选：媒体走 MinIO 时也可在此反代（需 MinIO 监听本地） ----
    # location /media/ {
    #     proxy_pass http://127.0.0.1:9000/;
    #     proxy_set_header Host $host;
    # }
}

# =============================================================
# 生产建议（HTTPS，注释默认关闭）：
# 1) 申请证书：sudo certbot --nginx -d monitor.example.com
# 2) 或手动在上方 server 块前加：
# server {
#     listen 443 ssl;
#     server_name monitor.example.com;
#     ssl_certificate     /etc/letsencrypt/live/monitor.example.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/monitor.example.com/privkey.pem;
#     # 其余 location 同上（/、/ws/、/api/、/health、/metrics、/openapi.json）
# }
# 3) 将 80 端口 server 段改为：return 301 https://$host$request_uri;
# =============================================================
