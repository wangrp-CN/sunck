# 涉铁工程智能监控平台 —— Nginx 反向代理（最小可用）
# 用途：转发 /api、/ws（WebSocket）到 FastAPI；托管前端静态资源
# 部署：cp nginx.conf /opt/homebrew/etc/nginx/servers/rail_monitor.conf 后 nginx -s reload

upstream rail_api {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name localhost;

    # 前端静态资源（构建后的 dist 目录）
    location / {
        root /Users/wangpeng/PycharmProjects/RimpCode/rail_monitor/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    # REST API
    location /api/ {
        proxy_pass http://rail_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket（设备实时推送 / 大屏告警）
    location /ws/ {
        proxy_pass http://rail_api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # 对象存储（MinIO）代理（可选，便于同源访问图片/视频）
    location /files/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_set_header Host $host;
    }
}
