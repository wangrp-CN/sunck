# 涉铁工程智能监控平台 —— Nginx 反向代理（生产形态，server 片段）
# 部署：
#   Linux : cp nginx.conf /etc/nginx/conf.d/rail_monitor.conf && nginx -t && systemctl reload nginx
#   macOS : cp nginx.conf /opt/homebrew/etc/nginx/servers/rail_monitor.conf && nginx -t && nginx -s reload
# 依赖主配置已 include 对应目录（Linux /etc/nginx/nginx.conf 默认 include /etc/nginx/conf.d/*.conf；
#   macOS brew 版默认 include servers/*.conf）。
# TLS 证书用 certbot 申请：sudo certbot certonly --nginx -d rail.example.com，再替换下方 ssl_certificate 路径。
# 详见部署文档 README.deploy.md。

# ---------- HTTP → HTTPS 重定向 ----------
server {
    listen 80;
    server_name rail.example.com localhost;
    # 生产请把 localhost 改为正式域名；HSTS 可在确认 HTTPS 稳定后追加
    return 301 https://$host$request_uri;
}

upstream rail_api {
    server 127.0.0.1:8000;
}

# ---------- HTTPS 主站 ----------
server {
    listen 443 ssl;
    server_name rail.example.com localhost;

    # ---- TLS（certbot 申请后替换路径） ----
    ssl_certificate     /etc/ssl/rail_monitor/fullchain.pem;
    ssl_certificate_key /etc/ssl/rail_monitor/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # 大文件上传（告警媒体 / 视频证据）
    client_max_body_size 100M;

    # 安全响应头
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    # 前端静态资源（构建后的 dist 目录）
    # ⚠️ 生产环境请改为实际部署路径，例如 /var/www/rail_monitor/web/dist
    location / {
        root /Users/wangpeng/PycharmProjects/RimpCode/rail_monitor/web/dist;
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public";
    }

    # REST API
    location /api/ {
        proxy_pass http://rail_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket（设备实时推送 / 大屏告警）
    location /ws/ {
        proxy_pass http://rail_api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # 对象存储（MinIO）代理（同源访问图片 / 视频）
    location /files/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_set_header Host $host;
        client_max_body_size 100M;
    }
}
