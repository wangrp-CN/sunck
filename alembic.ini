# Alembic 配置（迁移目录与日志）
[alembic]
script_location = alembic
prepend_sys_path = .
# sqlalchemy.url 由 alembic/env.py 依据 settings.database_url 覆盖
sqlalchemy.url = postgresql+psycopg2://dev:dev123@127.0.0.1:5432/rail_monitor

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
